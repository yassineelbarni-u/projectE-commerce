<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>🔐 Login</h2>
                <p>Connectez-vous pour accéder à votre espace</p>
            </div>

            <!-- Message d'erreur -->
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                <strong>Erreur!</strong> Nom d'utilisateur ou mot de passe incorrect.
            </div>

            <!-- Message de déconnexion -->
            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                <strong>Déconnecté!</strong> Vous avez été déconnecté avec succès.
            </div>

            <div th:if="${param.registered}" class="alert alert-success" role="alert">
                <strong>Inscription réussie!</strong> Vous pouvez maintenant vous connecter.
            </div>

            <!-- Formulaire de connexion -->
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Nom d'utilisateur</label>
                    <input type="text" class="form-control" id="username" name="username" 
                           placeholder="Entrez votre nom d'utilisateur" required autofocus>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Entrez votre mot de passe" required>
                </div>

                <button type="submit" class="btn btn-primary btn-login">
                    Se connecter
                </button>
            </form>

            <div class="text-center mt-3">
                <small class="text-muted d-block">Utilisateur admin par défaut: admin (mot de passe: 1234)</small>
                <a th:href="@{/register}" class="text-decoration-none">Créer un compte client</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
