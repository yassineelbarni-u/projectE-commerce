services:
  db:
    image: mysql:latest
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: gestion_bibliotheque
      MYSQL_ROOT_PASSWORD: mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmysql"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build:
      context: .
    container_name: storeshop
    restart: always
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: gestion_bibliotheque
      DB_USER: root
      DB_PASSWORD: mysql
      APP_UPLOAD_DIR: /var/lib/storeshop/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storeshop-uploads:/var/lib/storeshop/uploads

volumes:
  mysql-data:
  storeshop-uploads:
