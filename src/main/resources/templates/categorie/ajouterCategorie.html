<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une Catégorie</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
</head>
<body>
<div class="admin-shell">

    <div th:insert="~{adminLayout :: sidebar('categories')}"></div>

    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <div class="topbar-title">Nouvelle catégorie</div>
                <div class="topbar-breadcrumb">
                    <a th:href="@{/admin/categories}" style="color:inherit;text-decoration:none;">Catégories</a> › Ajouter
                </div>
            </div>
        </header>
        <main class="admin-content">

            <div th:if="${param.error}" class="alert-custom danger">
                <span>Erreur:</span><span th:text="${param.error[0]}"></span>
                <button class="alert-close" onclick="this.parentElement.remove()">Fermer</button>
            </div>

            <div class="page-header">
                <div class="page-header-left">
                    <h1>Ajouter une Catégorie</h1>
                    <p>Créer une nouvelle catégorie de produits</p>
                </div>
                <div class="page-header-right">
                    <a th:href="@{/admin/categories}" class="btn-ghost">Retour</a>
                </div>
            </div>

            <div class="panel" style="max-width:520px;">
                <div class="panel-header"><h2>Informations de la catégorie</h2></div>
                <div class="panel-body">
                    <form method="post" th:action="@{/admin/categories/add}" th:object="${categorie}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div style="margin-bottom:20px;">
                            <label for="nom" class="form-label-custom">Nom de la catégorie *</label>
                            <input type="text" class="form-control-custom" id="nom" th:field="*{nom}"
                                   placeholder="Ex: Smartphones, Laptops, Audio..." required>
                            <p class="form-hint">Le nom doit être unique dans le catalogue.</p>
                        </div>
                        <div style="display:flex;gap:10px;">
                            <button type="submit" class="btn-icon save">Enregistrer</button>
                            <a th:href="@{/admin/categories}" class="btn-ghost">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
