<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Ajouter Produit</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
</head>
<body>
<div class="admin-shell">

    <div th:insert="~{adminLayout :: sidebar('produits')}"></div>

    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <div class="topbar-title">Nouveau produit</div>
                <div class="topbar-breadcrumb">
                    <a th:href="@{/admin/produits}" style="color:inherit;text-decoration:none;">Produits</a> › Ajouter
                </div>
            </div>
        </header>
        <main class="admin-content">
            <div class="page-header">
                <div class="page-header-left">
                    <h1>Ajouter un Produit</h1>
                    <p>Remplissez les informations pour créer un nouveau produit</p>
                </div>
                <div class="page-header-right">
                    <a th:href="@{/admin/produits(search=${search})}" class="btn-ghost">Retour</a>
                </div>
            </div>

            <form th:object="${produit}" th:action="@{/admin/produits/add}" method="post" enctype="multipart/form-data">
                <div style="display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start;">

                    <!-- Colonne gauche -->
                    <div style="display:flex;flex-direction:column;gap:16px;">
                        <div class="panel">
                            <div class="panel-header"><h2>Informations générales</h2></div>
                            <div class="panel-body" style="display:flex;flex-direction:column;gap:14px;">
                                <div>
                                    <label for="nom" class="form-label-custom">Nom du produit *</label>
                                    <input type="text" th:field="*{name}" class="form-control-custom" id="nom" placeholder="Ex: iPhone 15 Pro" required>
                                </div>
                                <div>
                                    <label for="categorieId" class="form-label-custom">Catégorie *</label>
                                    <select name="categorieId" id="categorieId" required class="form-control-custom">
                                        <option value="">-- Sélectionnez une catégorie --</option>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.nom}"></option>
                                    </select>
                                    <p class="form-hint"><a th:href="@{/admin/categories}" target="_blank" style="color:var(--accent);">Gérer les catégories</a></p>
                                </div>
                                <div>
                                    <label for="description" class="form-label-custom">Description *</label>
                                    <textarea th:field="*{description}" class="form-control-custom" id="description" rows="4" placeholder="Décrivez le produit..." required style="resize:vertical;"></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="panel">
                            <div class="panel-header"><h2>Image du produit</h2></div>
                            <div class="panel-body" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                                <div>
                                    <label for="imageFile" class="form-label-custom">Uploader depuis le PC</label>
                                    <input type="file" class="form-control-custom" id="imageFile" name="imageFile" accept="image/*">
                                    <p class="form-hint">JPG, PNG, GIF, WEBP</p>
                                </div>
                                <div>
                                    <label for="imageUrl" class="form-label-custom">Ou entrer une URL</label>
                                    <input type="url" th:field="*{imageUrl}" class="form-control-custom" id="imageUrl" placeholder="https://...">
                                    <p class="form-hint">Le fichier a la priorité sur l'URL</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Colonne droite -->
                    <div style="display:flex;flex-direction:column;gap:16px;">
                        <div class="panel">
                            <div class="panel-header"><h2>Prix et stock</h2></div>
                            <div class="panel-body" style="display:flex;flex-direction:column;gap:14px;">
                                <div>
                                    <label for="prix" class="form-label-custom">Prix (€) *</label>
                                    <input type="number" step="0.01" th:field="*{price}" class="form-control-custom" id="prix" placeholder="0.00" required>
                                </div>
                                <div>
                                    <label for="stock" class="form-label-custom">Stock *</label>
                                    <input type="number" th:field="*{stock}" class="form-control-custom" id="stock" placeholder="0" required>
                                </div>
                            </div>
                        </div>
                        <div class="panel">
                            <div class="panel-body" style="display:flex;flex-direction:column;gap:10px;">
                                <button type="submit" class="btn-icon save" style="width:100%;justify-content:center;">Ajouter le produit</button>
                                <a th:href="@{/admin/produits(search=${search})}" class="btn-ghost" style="width:100%;text-align:center;">Annuler</a>
                            </div>
                        </div>
                    </div>

                </div>
            </form>
        </main>
    </div>
</div>
</body>
</html>
