<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Liste des Produits</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<div class="admin-shell">

    <div th:insert="~{adminLayout :: sidebar('produits')}"></div>

    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <div class="topbar-title">Produits</div>
                <div class="topbar-breadcrumb">
                    <a th:href="@{/admin/dashboard}" style="color:inherit;text-decoration:none;">Accueil</a> › Produits
                </div>
            </div>
            <div class="topbar-actions">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/produits/add(search=${search})}" class="btn-primary-custom">Ajouter</a>
            </div>
        </header>
        <main class="admin-content">
            <div class="page-header">
                <div class="page-header-left">
                    <h1>Gestion des Produits</h1>
                    <p>Liste complète des produits du catalogue</p>
                </div>
                <div class="page-header-right">
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/produits/add(search=${search})}" class="btn-primary-custom">Nouveau produit</a>
                    <a th:href="@{/admin/dashboard}" class="btn-ghost">Dashboard</a>
                </div>
            </div>

            <!-- Search -->
            <div class="panel" style="margin-bottom:16px;">
                <div class="panel-body" style="padding:14px 20px;">
                    <form method="get" th:action="@{/admin/produits}">
                        <div style="display:flex;gap:10px;align-items:center;">
                            <input type="text" name="search" th:value="${search}" class="form-control-custom"
                                   placeholder="Rechercher un produit..." style="flex:1;">
                            <button type="submit" class="btn-primary-custom">Rechercher</button>
                            <a th:if="${search != null and !search.isEmpty()}" th:href="@{/admin/produits}" class="btn-ghost">Effacer</a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Table -->
            <div class="panel">
                <div class="panel-header"><h2>Catalogue produits</h2></div>
                <div style="overflow-x:auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Image</th><th>Nom</th><th>Catégorie</th><th>Description</th><th>Prix</th><th>Stock</th>
                                <th sec:authorize="hasRole('ADMIN')">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="produit : ${ListeProduit}">
                                <td>
                                    <img th:if="${produit.imageUrl != null and !produit.imageUrl.isEmpty()}"
                                         th:src="@{${produit.imageUrl}}" alt="img"
                                         style="width:44px;height:44px;object-fit:cover;border-radius:8px;border:1px solid var(--border);">
                                     <div th:unless="${produit.imageUrl != null and !produit.imageUrl.isEmpty()}"
                                         style="width:44px;height:44px;border-radius:8px;background:var(--bg-surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;">Image</div>
                                </td>
                                <td><strong th:text="${produit.name}"></strong></td>
                                <td>
                                    <span th:if="${produit.categorie != null}" class="badge-role user" th:text="${produit.categorie.nom}"></span>
                                    <span th:unless="${produit.categorie != null}" style="font-size:11px;color:#a0aec0;">—</span>
                                </td>
                                <td style="color:var(--text-secondary);max-width:200px;">
                                    <span th:text="${#strings.abbreviate(produit.description, 55)}"></span>
                                </td>
                                <td><strong th:text="${produit.price} + ' €'"></strong></td>
                                <td>
                                    <span th:if="${produit.stock > 10}" style="display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;background:#ecfdf5;color:#059669;" th:text="${produit.stock}"></span>
                                    <span th:unless="${produit.stock > 10}" style="display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;background:#fffbeb;color:#d97706;" th:text="${produit.stock}"></span>
                                </td>
                                <td sec:authorize="hasRole('ADMIN')">
                                    <div style="display:flex;gap:6px;">
                                                     <a th:href="@{/admin/produits/edit(id=${produit.id}, search=${search})}" class="btn-icon edit">Modifier</a>
                                        <a onclick="return confirm('Supprimer ce produit ?')"
                                           th:href="@{/admin/produits/delete(id=${produit.id}, page=${currentPage}, search=${search})}"
                                                         class="btn-icon delete">Supprimer</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div th:if="${pages != null and pages.length > 1}" style="padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;">
                    <span style="font-size:12px;color:var(--text-muted);margin-right:6px;">Page :</span>
                    <a th:each="page,status : ${pages}"
                       th:href="@{/admin/produits(page=${status.index}, search=${search})}"
                       th:text="${status.index + 1}"
                       th:style="${status.index == currentPage} ?
                           'display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;font-size:12px;font-weight:600;background:var(--accent);color:#fff;text-decoration:none;' :
                           'display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;font-size:12px;background:var(--bg-surface2);color:var(--text-secondary);text-decoration:none;border:1px solid var(--border);'">
                    </a>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
