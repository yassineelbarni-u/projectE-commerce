<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un Utilisateur</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
</head>
<body>
<div class="admin-shell">

    <div th:insert="~{adminLayout :: sidebar('users')}"></div>

    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <div class="topbar-title">Nouvel utilisateur</div>
                <div class="topbar-breadcrumb">
                    <a th:href="@{/admin/users}" style="color:inherit;text-decoration:none;">Utilisateurs</a> › Ajouter
                </div>
            </div>
        </header>
        <main class="admin-content">
            <div th:if="${param.error}" class="alert-custom danger">
                <span>Erreur:</span><span th:text="${param.error}"></span>
                <button class="alert-close" onclick="this.parentElement.remove()">Fermer</button>
            </div>
            <div class="page-header">
                <div class="page-header-left">
                    <h1>Ajouter un Utilisateur</h1>
                    <p>Créer un nouveau compte avec ses rôles</p>
                </div>
                <div class="page-header-right">
                    <a th:href="@{/admin/users}" class="btn-ghost">Retour</a>
                </div>
            </div>

            <div class="panel" style="max-width:680px;">
                <div class="panel-header"><h2>Informations du compte</h2></div>
                <div class="panel-body">
                    <form method="post" th:action="@{/admin/users/add}">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
                            <div>
                                <label for="username" class="form-label-custom">Nom d'utilisateur *</label>
                                <input type="text" class="form-control-custom" id="username" name="username" placeholder="yassine " required>
                            </div>
                            <div>
                                <label for="email" class="form-label-custom">Email *</label>
                                <input type="email" class="form-control-custom" id="email" name="email" placeholder="ex: yassine@mail.com" required>
                            </div>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
                            <div>
                                <label for="password" class="form-label-custom">Mot de passe *</label>
                                <input type="password" class="form-control-custom" id="password" name="password" placeholder="********" required>
                            </div>
                            <div>
                                <label for="confirmPassword" class="form-label-custom">Confirmer *</label>
                                <input type="password" class="form-control-custom" id="confirmPassword" name="confirmPassword" placeholder="********" required>
                            </div>
                        </div>
                        <div style="margin-bottom:24px;">
                            <label class="form-label-custom">Rôles</label>
                            <div style="background:var(--bg-surface2);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden;">
                                <div th:each="enumRole : ${roles}" class="form-check-custom">
                                    <input type="radio" name="role" th:value="${enumRole.name()}" th:id="${'role_' + enumRole.name()}" style="width:16px;height:16px;accent-color:var(--accent);" required>
                                    <label th:for="${'role_' + enumRole.name()}" style="cursor:pointer;">
                                        <span th:class="${enumRole.name() == 'ADMIN'} ? 'badge-role admin' : 'badge-role user'" th:text="${enumRole.name()}"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div style="display:flex;gap:10px;">
                            <button type="submit" class="btn-icon save">Enregistrer</button>
                            <a th:href="@{/admin/users}" class="btn-ghost">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
