<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes commandes — StoreShop</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/public.css}" />
</head>
<body>

<nav class="pub-nav">
    <a th:href="@{/}" class="pub-nav-brand">
        <div class="brand-dot">🛒</div>
        <span class="brand-name">StoreShop</span>
    </a>
    <ul class="pub-nav-links">
        <li><a th:href="@{/produits}" class="nav-link-hide">Catalogue</a></li>
        <li sec:authorize="isAnonymous()"><a th:href="@{/login}">Connexion</a></li>
        <li sec:authorize="isAnonymous()"><a th:href="@{/register}" class="nav-cta">Créer un compte</a></li>
        <li sec:authorize="isAuthenticated()"><a th:href="@{/panier}">Panier <span class="cart-pill" th:text="${cartCount}">0</span></a></li>
        <li sec:authorize="isAuthenticated()"><a th:href="@{/commandes}">Mes commandes</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/dashboard}" class="nav-cta">Dashboard</a></li>
    </ul>
</nav>

<section class="pub-section">
    <div class="section-header">
        <h2 class="section-title">Historique des commandes</h2>
        <span class="section-count" th:text="${orders != null ? #lists.size(orders) : 0} + ' commande(s)'">0 commande(s)</span>
    </div>

    <div class="cart-empty" th:if="${orders == null or #lists.isEmpty(orders)}">
        <div class="cart-empty-icon">📦</div>
        <h3>Aucune commande</h3>
        <p>Vos commandes apparaîtront ici après validation.</p>
        <a th:href="@{/produits}" class="btn-ink">Découvrir le catalogue →</a>
    </div>

    <div class="orders-list" th:if="${orders != null and !#lists.isEmpty(orders)}">
        <article class="order-card" th:each="order : ${orders}">
            <div class="order-head">
                <div>
                    <div class="order-title" th:text="'Commande #' + ${order.id}"></div>
                    <div class="order-sub" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
                </div>
                <div class="order-status" th:text="${order.status}"></div>
            </div>
            <div class="order-items">
                <div class="order-item" th:each="item : ${order.items}">
                    <div>
                        <div class="order-item-name" th:text="${item.produit.name}"></div>
                        <div class="order-item-meta" th:text="${item.quantity} + ' × ' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)} + ' €'"></div>
                    </div>
                    <div class="order-item-total" th:text="${#numbers.formatDecimal(item.lineTotal, 1, 2)} + ' €'"></div>
                </div>
            </div>
            <div class="order-footer">
                <span>Total</span>
                <strong th:text="${#numbers.formatDecimal(order.total, 1, 2)} + ' €'"></strong>
            </div>
        </article>
    </div>
</section>

</body>
</html>
