<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — StoreShop</title>
    <link rel="stylesheet" th:href="@{/css/register.css}" />
</head>
<body>

<div class="reg-shell">

    <!-- LEFT visual -->
    <div class="reg-visual">
        <div class="reg-overlay"></div>
        <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=900&q=80&fit=crop" alt="" class="reg-img">
        <div class="reg-visual-content">
            <a th:href="@{/}" class="reg-brand">
                <div class="rb-dot">SS</div>
                <div>
                    <div class="rb-name">StoreShop</div>
                    <div class="rb-sub">Espace client</div>
                </div>
            </a>
            <div class="reg-quote">
                <div class="rq-line"></div>
                <blockquote>Rejoignez notre communauté et accédez à votre espace personnel.</blockquote>
            </div>
        </div>
    </div>

    <!-- RIGHT form -->
    <div class="reg-right">
        <div class="reg-card">

            <div class="reg-header">
                <h2>Créer un compte</h2>
                <p>Remplissez le formulaire pour rejoindre StoreShop</p>
            </div>

            <div th:if="${param.error}" class="reg-alert">
                <span>Erreur:</span> <span th:text="${param.error}"></span>
            </div>

            <form th:action="@{/register}" method="post">
                <div class="reg-row">
                    <div class="field-group">
                        <label for="username">Nom d'utilisateur</label>
                        <input type="text" id="username" name="username"
                               th:value="${param.username}"
                               placeholder="Votre identifiant" required>
                    </div>
                    <div class="field-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email"
                               th:value="${param.email}"
                               placeholder="nom@example.com" required>
                    </div>
                </div>
                <div class="reg-row">
                    <div class="field-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password"
                               placeholder="••••••••" required>
                    </div>
                    <div class="field-group">
                        <label for="confirmPassword">Confirmer</label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                               placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="reg-btn">Créer mon compte</button>
            </form>

            <div class="reg-footer">
                <a th:href="@{/login}">Déjà inscrit ? Connexion</a>
                <span>·</span>
                <a th:href="@{/produits}">Retour au catalogue</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
